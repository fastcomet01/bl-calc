<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>expense. — Everyday Expense Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --ink: #0a0a0a;
    --muted: #6b6b6b;
    --hair: #ebebeb;
    --bg: #f4f4f4;
    --card: #ffffff;
    --chip: #f2f2f2;
    --shadow: 0 18px 40px -18px rgba(0,0,0,0.18), 0 6px 16px -8px rgba(0,0,0,0.08);
    --shadow-soft: 0 10px 30px -16px rgba(0,0,0,0.15);
  }

  @property --p { syntax: '<number>'; inherits: true; initial-value: 0; }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button { font-family: inherit; }

  .stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 16px;
  }

  /* 9:16 phone frame */
  .phone {
    width: min(420px, 100%);
    aspect-ratio: 9 / 16;
    background: #ffffff;
    border-radius: 48px;
    border: 1px solid #e6e6e6;
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,0.25),
      0 18px 40px -20px rgba(0,0,0,0.18);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px 6px;
    font-size: 12px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: 0.2px;
  }
  .status .right { display: flex; gap: 6px; align-items: center; }
  .dot-row { display:inline-flex; gap:2px; align-items:flex-end; }
  .dot-row i { display:inline-block; width:3px; background:#000; border-radius:1px; }
  .dot-row i:nth-child(1){ height:4px } .dot-row i:nth-child(2){ height:6px }
  .dot-row i:nth-child(3){ height:8px } .dot-row i:nth-child(4){ height:10px }
  .batt {
    width: 22px; height: 11px; border:1.4px solid #000; border-radius:3px;
    position:relative; padding:1px;
  }
  .batt::after{
    content:""; position:absolute; right:-3px; top:3px; width:2px; height:4px;
    background:#000; border-radius:1px;
  }
  .batt span{ display:block; height:100%; width:75%; background:#000; border-radius:1px;}

  /* Scrollable content */
  .scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 22px 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar{ display: none; }

  /* Top header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 32px; height: 32px;
    background: #000; color:#fff;
    border-radius: 12px;
    display:grid; place-items:center;
  }
  .brand-text {
    font-weight: 900;
    font-size: 18px;
    letter-spacing: -0.02em;
  }
  .brand-text .dot { color: var(--muted); }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #f0f0f0;
    border: 1px solid #e6e6e6;
    display:grid; place-items:center;
    cursor: pointer;
  }

  /* Title block */
  .hero {
    margin-top: 4px;
    padding: 0 2px;
  }
  .hero h1 {
    font-size: 26px;
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin: 8px 0 6px;
  }
  .hero p {
    font-size: 13.5px;
    color: var(--muted);
    margin: 0 0 14px;
    font-weight: 500;
  }
  .pill-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #000;
    color: #fff;
    padding: 12px 18px 12px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 13.5px;
    border: none;
    cursor: pointer;
    box-shadow: 0 10px 24px -12px rgba(0,0,0,0.5);
    transition: transform .12s ease;
  }
  .pill-cta:active { transform: scale(.97); }
  .pill-cta .plus {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #fff;
    color: #000;
    display: grid;
    place-items: center;
    font-weight: 900;
    font-size: 16px;
  }

  /* Main calc card */
  .card {
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 18px 18px 16px;
    border: 1px solid #f0f0f0;
  }
  .card .row {
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .label {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .amount {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    margin: 8px 0 2px;
    font-variant-numeric: tabular-nums;
    transition: transform .25s cubic-bezier(.2,.8,.2,1);
  }
  .amount.bump { transform: scale(1.05); }
  .sub-amount {
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 600;
  }
  .sub-amount b { color: #000; font-weight: 800; font-variant-numeric: tabular-nums; }

  .ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .ring {
    --p: 0;
    width: 56px; height: 56px;
    border-radius: 50%;
    background:
      conic-gradient(#000 calc(var(--p) * 1%), #ececec 0);
    display: grid;
    place-items: center;
    transition: --p .6s cubic-bezier(.2,.8,.2,1);
  }
  .ring::after {
    content: "";
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #fff;
  }
  .ring span {
    position: absolute;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .ring-cell{ position: relative; display:grid; place-items:center; }
  .ring-cap{
    font-size: 10px; color: var(--muted); font-weight:700; letter-spacing:.08em;
    text-transform: uppercase;
  }

  .chip-row{
    display:flex; gap:8px; margin-top: 14px; overflow-x: auto;
    scrollbar-width: none; padding-bottom: 2px;
  }
  .chip-row::-webkit-scrollbar{ display:none; }
  .chip {
    background: var(--chip);
    color: #000;
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid #ececec;
    white-space: nowrap;
    cursor: pointer;
    transition: background .15s, color .15s, transform .12s;
    user-select: none;
  }
  .chip:active{ transform: scale(.96); }
  .chip.active{ background: #000; color:#fff; border-color:#000; }
  .chip.active svg path,
  .chip.active svg circle,
  .chip.active svg rect { stroke: #fff; }
  .chip.active svg circle[fill="#000"]{ fill:#fff; }
  .chip svg{ width:13px; height:13px; }

  /* Input card */
  .inputs {
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow-soft);
    padding: 14px;
    border: 1px solid #f0f0f0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .field {
    display:flex; align-items:center; gap:10px;
    background: #f6f6f6;
    border-radius: 18px;
    padding: 11px 14px;
    border: 1px solid #efefef;
    transition: border-color .15s, background .15s;
  }
  .field:focus-within{ border-color:#000; background:#fff; }
  .field svg{ width:16px; height:16px; flex:none; }
  .field input{
    border:none; background:transparent; outline:none;
    font: inherit; font-weight:700; font-size:13.5px;
    width:100%; color:#000;
  }
  .field input::placeholder{ color:#9a9a9a; font-weight:600; }

  .cat-row{
    display:flex; align-items:center; justify-content:space-between;
    padding: 4px 4px 0;
  }
  .cats{ display:flex; gap:14px; }
  .cat-ic{
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #f4f4f4;
    border: 1px solid #ececec;
    display:grid; place-items:center;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .12s;
  }
  .cat-ic:active{ transform: scale(.94); }
  .cat-ic.on{ background: #000; border-color:#000; }
  .cat-ic.on svg path,
  .cat-ic.on svg circle,
  .cat-ic.on svg rect { stroke:#fff; }
  .calc-btn{
    background: #000; color: #fff;
    border-radius: 999px;
    padding: 10px 18px;
    font-weight: 800;
    font-size: 13px;
    border: none;
    cursor: pointer;
    letter-spacing: .01em;
    transition: transform .12s;
  }
  .calc-btn:active{ transform: scale(.96); }
  .calc-btn:disabled{ opacity:.4; cursor: not-allowed; }

  /* Two bottom cards */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .mini {
    background: var(--card);
    border-radius: 26px;
    box-shadow: var(--shadow-soft);
    border: 1px solid #f0f0f0;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 130px;
    cursor: pointer;
    transition: transform .12s, box-shadow .15s;
  }
  .mini:active{ transform: scale(.98); }
  .mini .ic {
    width: 36px; height: 36px;
    background: #f4f4f4;
    border-radius: 12px;
    display:grid; place-items:center;
    border: 1px solid #ececec;
  }
  .mini h3 {
    margin: 4px 0 0;
    font-size: 14.5px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .mini p {
    margin: 0;
    font-size: 11.5px;
    color: var(--muted);
    font-weight: 600;
  }
  .mini .mini-foot{
    margin-top: auto;
    display:flex; align-items:center; justify-content:space-between;
  }
  .mini .mini-val{
    font-size: 13px; font-weight: 800; letter-spacing:-.01em;
    font-variant-numeric: tabular-nums;
  }
  .mini .arrow{
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #000;
    color:#fff;
    display:grid; place-items:center;
  }

  /* Bottom nav */
  .nav {
    position: absolute;
    left: 16px; right: 16px; bottom: 14px;
    background: #000;
    border-radius: 999px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 10px;
    box-shadow: 0 18px 40px -16px rgba(0,0,0,0.45);
    z-index: 4;
  }
  .nav button{
    background: transparent; border: none; color: #9b9b9b;
    width: 44px; height: 44px; border-radius: 50%;
    display:grid; place-items:center; cursor:pointer;
    transition: background .15s, color .15s, transform .12s;
  }
  .nav button:active{ transform: scale(.92); }
  .nav button.active{ background: #fff; color:#000; }

  /* home indicator */
  .home-ind{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:6px; width:120px; height:4px; background:#000; border-radius:4px; opacity:.85;
    z-index: 5;
  }

  /* notch */
  .notch{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:104px; height:28px; background:#000; border-radius:999px;
    z-index: 3;
  }

  .pad-bottom{ height: 78px; flex:none; }

  /* Sheet (slide-up modal) */
  .sheet-wrap{
    position:absolute; inset:0; z-index: 20;
    pointer-events: none;
  }
  .backdrop{
    position:absolute; inset:0;
    background: rgba(0,0,0,0);
    transition: background .25s ease;
  }
  .sheet-wrap.open{ pointer-events: auto; }
  .sheet-wrap.open .backdrop{ background: rgba(0,0,0,.4); }
  .sheet{
    position:absolute; left:8px; right:8px; bottom:8px;
    background:#fff; border-radius: 32px;
    transform: translateY(110%);
    transition: transform .35s cubic-bezier(.2,.85,.25,1);
    padding: 16px 18px 18px;
    max-height: 82%;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 -24px 60px -20px rgba(0,0,0,.35);
    border: 1px solid #ececec;
  }
  .sheet-wrap.open .sheet{ transform: translateY(0); }
  .sheet-grab{
    width:42px; height:4px; background:#e0e0e0; border-radius:4px;
    margin: 0 auto 10px;
  }
  .sheet-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 12px;
  }
  .sheet-head h2{
    margin:0; font-size:18px; font-weight:900; letter-spacing:-.02em;
  }
  .sheet-close{
    width:30px; height:30px; border-radius:50%;
    background:#f2f2f2; border:1px solid #ececec; cursor:pointer;
    display:grid; place-items:center;
  }
  .sheet-body{
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    padding-right: 2px;
  }

  /* History list */
  .hist-row{
    display:flex; align-items:center; gap:12px;
    padding: 10px 4px;
    border-bottom: 1px solid #f2f2f2;
  }
  .hist-row:last-child{ border-bottom:none; }
  .hist-ic{
    width:36px; height:36px; border-radius:12px;
    background:#f4f4f4; border:1px solid #ececec;
    display:grid; place-items:center; flex:none;
  }
  .hist-meta{ flex:1; min-width:0; }
  .hist-name{
    font-size: 13.5px; font-weight: 800; letter-spacing:-.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .hist-sub{
    font-size: 11px; color: var(--muted); font-weight: 600; margin-top:2px;
  }
  .hist-amt{
    font-size: 14px; font-weight: 900; letter-spacing:-.02em;
    font-variant-numeric: tabular-nums;
  }
  .hist-del{
    width:26px; height:26px; border-radius:50%;
    background:#fff; border:1px solid #ececec; cursor:pointer;
    display:grid; place-items:center; color:#000;
    font-size: 16px; font-weight: 800; line-height:1; padding:0;
  }
  .hist-del:hover{ background:#000; color:#fff; border-color:#000; }
  .empty{
    text-align:center; padding: 32px 8px;
    color: var(--muted); font-size: 13px; font-weight:600;
  }
  .sheet-foot{
    display:flex; justify-content:space-between; gap:10px;
    padding-top: 12px; margin-top: 8px;
    border-top: 1px solid #f2f2f2;
  }
  .ghost-btn{
    background:#fff; color:#000; border:1px solid #e6e6e6;
    border-radius: 999px; padding: 9px 14px;
    font-weight: 800; font-size: 12.5px; cursor:pointer;
  }
  .ghost-btn:hover{ background:#000; color:#fff; }

  /* Budget editor */
  .big-field{
    background:#f6f6f6; border-radius: 22px; border:1px solid #efefef;
    padding: 18px;
    display:flex; align-items:center; gap:8px;
    margin-bottom: 12px;
  }
  .big-field .dollar{
    font-size: 32px; font-weight: 900; color: var(--muted);
  }
  .big-field input{
    border:none; outline:none; background:transparent;
    font: inherit; font-size: 32px; font-weight: 900;
    letter-spacing:-.03em; width:100%;
    font-variant-numeric: tabular-nums;
  }
  .preset-row{
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 12px;
  }
  .preset{
    background:#f2f2f2; border:1px solid #ececec;
    border-radius: 999px; padding: 7px 13px;
    font-weight: 800; font-size: 12px; cursor: pointer;
  }
  .preset:hover{ background:#000; color:#fff; border-color:#000; }
  .save-btn{
    background:#000; color:#fff; border:none;
    border-radius: 999px; padding: 13px 18px;
    font-weight: 800; font-size: 13.5px; cursor:pointer;
    width: 100%;
  }
  .save-btn:active{ transform: scale(.98); }

  /* Toast */
  .toast{
    position:absolute; left:50%; bottom:90px;
    transform: translateX(-50%) translateY(20px);
    background:#000; color:#fff; padding: 10px 16px;
    border-radius: 999px; font-size: 12.5px; font-weight: 800;
    letter-spacing: .01em;
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .25s cubic-bezier(.2,.8,.2,1);
    z-index: 30;
    box-shadow: 0 12px 30px -12px rgba(0,0,0,.5);
    white-space: nowrap;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Profile quick-add tile */
  .quick-tile{
    background:#fff; border:1px solid #f0f0f0; border-radius: 22px;
    padding: 14px; text-align:left; cursor:pointer;
    display:flex; flex-direction:column; gap:6px;
    transition: transform .12s, background .15s, border-color .15s;
    box-shadow: var(--shadow-soft);
  }
  .quick-tile:active{ transform: scale(.97); }
  .quick-tile:hover{ border-color:#d8d8d8; }
  .quick-tile .ic{
    width:34px; height:34px; border-radius:12px;
    background:#f4f4f4; border:1px solid #ececec;
    display:grid; place-items:center; margin-bottom: 2px;
  }
  .quick-title{ font-size:13.5px; font-weight:800; letter-spacing:-.01em; }
  .quick-sub{ font-size:11px; color: var(--muted); font-weight:600; }

  /* Stats sheet bars */
  .stat-row{
    display:flex; align-items:center; gap:12px;
    padding: 10px 4px;
  }
  .stat-name{
    width: 78px; font-size: 12.5px; font-weight: 800;
  }
  .stat-bar{
    flex:1; height: 10px; background:#f0f0f0; border-radius:999px;
    overflow:hidden;
  }
  .stat-bar i{
    display:block; height:100%; background:#000; border-radius:999px;
    transition: width .5s cubic-bezier(.2,.8,.2,1);
  }
  .stat-amt{
    width: 64px; text-align:right; font-size:12.5px; font-weight:800;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="phone" role="application" aria-label="Everyday Expense Calculator">
      <div class="notch"></div>

      <!-- Status bar -->
      <div class="status">
        <span>9:41</span>
        <div class="right">
          <span class="dot-row"><i></i><i></i><i></i><i></i></span>
          <svg width="14" height="10" viewBox="0 0 16 12" fill="none" aria-hidden="true">
            <path d="M1 4.5C5 1 11 1 15 4.5" stroke="#000" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M3.5 7C6 5 10 5 12.5 7" stroke="#000" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="8" cy="9.6" r="1.1" fill="#000"/>
          </svg>
          <span class="batt"><span></span></span>
        </div>
      </div>

      <div class="scroll" id="scroll">
        <!-- Header -->
        <div class="header">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                <rect x="3" y="3" width="14" height="14" rx="4" stroke="#fff" stroke-width="1.6"/>
                <path d="M7 8h6M7 12h6M10 6v8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="brand-text">expense<span class="dot">.</span></div>
          </div>
          <div class="avatar" id="avatar" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="7.5" r="3" stroke="#000" stroke-width="1.6"/>
              <path d="M3.5 17c1.2-3 3.6-4.5 6.5-4.5s5.3 1.5 6.5 4.5" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <!-- Hero -->
        <div class="hero">
          <h1>Everyday Expense<br/>Calculator</h1>
          <p>Track what you spend. Know what's left.</p>
          <button class="pill-cta" type="button" id="add-cta">
            <span class="plus" aria-hidden="true">+</span>
            Add expense
          </button>
        </div>

        <!-- Main calc card -->
        <section class="card" aria-label="Today's spending overview">
          <div class="row">
            <div>
              <div class="label">Today's Spending</div>
              <div class="amount" id="today-amount">$0.00</div>
              <div class="sub-amount">Budget left: <b id="budget-left">$200.00</b></div>
            </div>
            <div class="ring-wrap">
              <div class="ring-cell">
                <div class="ring" id="ring"></div>
                <span id="ring-pct">0%</span>
              </div>
              <div class="ring-cap">used</div>
            </div>
          </div>
          <div class="chip-row" id="chip-row" role="tablist">
            <span class="chip active" data-cat="food" role="tab">
              <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M5 4v5a3 3 0 006 0V4M8 4v16M12 12c0 2 1 3 3 3V4c-2 0-3 1-3 3v5z" stroke="#000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Food
            </span>
            <span class="chip" data-cat="transport" role="tab">
              <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M3 12l2-5h10l2 5M5 12h10v3H5z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/>
                <circle cx="7" cy="15.5" r="1.2" fill="#000"/>
                <circle cx="13" cy="15.5" r="1.2" fill="#000"/>
              </svg>
              Transport
            </span>
            <span class="chip" data-cat="shopping" role="tab">
              <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M4 7h12l-1 9H5L4 7z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M7 7a3 3 0 016 0" stroke="#000" stroke-width="1.6"/>
              </svg>
              Shop
            </span>
            <span class="chip" data-cat="bills" role="tab">
              <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M4 4h12v13l-2-1.2-2 1.2-2-1.2-2 1.2-2-1.2L4 17V4z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M7 8h6M7 11h4" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              Bills
            </span>
          </div>
        </section>

        <!-- Inputs -->
        <section class="inputs" aria-label="Add an expense">
          <div class="field">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 3v14M13 6.5C13 5 11.7 4 10 4S7 5 7 6.5 8.3 9 10 9s3 1 3 2.5S11.7 13 10 13s-3-1-3-2.5"/>
            </svg>
            <input id="amount" type="text" inputmode="decimal" placeholder="Enter amount" autocomplete="off" />
          </div>
          <div class="field">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 5h12M4 10h12M4 15h8"/>
            </svg>
            <input id="name" type="text" placeholder="Expense name" autocomplete="off" />
          </div>
          <div class="field">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="10" cy="10" r="7"/>
              <path d="M10 6v4l3 2"/>
            </svg>
            <input id="time" type="time" autocomplete="off" aria-label="Time (optional)" />
          </div>

          <div class="cat-row">
            <div class="cats" aria-label="Category" id="cats">
              <div class="cat-ic on" data-cat="food" title="Food" role="button" tabindex="0">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                  <path d="M5 4v5a3 3 0 006 0V4M8 4v16M13 12c0 2 1 3 3 3V4c-2 0-3 1-3 3v5z" stroke="#000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="cat-ic" data-cat="transport" title="Transport" role="button" tabindex="0">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                  <path d="M3 12l2-5h10l2 5M5 12h10v3H5z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/>
                  <circle cx="7" cy="15.5" r="1.2" stroke="#000" stroke-width="1.2"/>
                  <circle cx="13" cy="15.5" r="1.2" stroke="#000" stroke-width="1.2"/>
                </svg>
              </div>
              <div class="cat-ic" data-cat="shopping" title="Shopping" role="button" tabindex="0">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                  <path d="M4 7h12l-1 9H5L4 7z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/>
                  <path d="M7 7a3 3 0 016 0" stroke="#000" stroke-width="1.6"/>
                </svg>
              </div>
              <div class="cat-ic" data-cat="bills" title="Bills" role="button" tabindex="0">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                  <path d="M4 4h12v13l-2-1.2-2 1.2-2-1.2-2 1.2-2-1.2L4 17V4z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <button class="calc-btn" type="button" id="calc-btn">Calculate</button>
          </div>
        </section>

        <!-- Bottom two cards -->
        <div class="grid-2">
          <div class="mini" data-action="budget" role="button" tabindex="0" aria-label="Daily Budget">
            <div class="ic" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="6" width="18" height="13" rx="3" stroke="#000" stroke-width="1.7"/>
                <path d="M3 9h13a2 2 0 012 2v3a2 2 0 01-2 2H3" stroke="#000" stroke-width="1.7"/>
                <circle cx="16.5" cy="12.5" r="1.1" fill="#000"/>
              </svg>
            </div>
            <h3>Daily<br/>Budget</h3>
            <p>Set your limit</p>
            <div class="mini-foot">
              <div class="mini-val" id="budget-value">$200.00</div>
              <div class="arrow" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
                  <path d="M6 6h8v8M6 14L14 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
            </div>
          </div>
          <div class="mini" data-action="history" role="button" tabindex="0" aria-label="Expense History">
            <div class="ic" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M6 3h12v18l-2-1.5-2 1.5-2-1.5-2 1.5-2-1.5L6 21V3z" stroke="#000" stroke-width="1.7" stroke-linejoin="round"/>
                <path d="M9 8h6M9 12h6M9 16h4" stroke="#000" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
            </div>
            <h3>Expense<br/>History</h3>
            <p>View past costs</p>
            <div class="mini-foot">
              <div class="mini-val" id="history-count">0 items</div>
              <div class="arrow" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
                  <path d="M6 6h8v8M6 14L14 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <div class="pad-bottom"></div>
      </div>

      <!-- Sheet -->
      <div class="sheet-wrap" id="sheet-wrap" aria-hidden="true">
        <div class="backdrop" id="backdrop"></div>
        <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
          <div class="sheet-grab"></div>
          <div class="sheet-head">
            <h2 id="sheet-title">Title</h2>
            <button class="sheet-close" id="sheet-close" aria-label="Close">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
                <path d="M5 5l10 10M15 5L5 15" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="sheet-body" id="sheet-body"></div>
        </div>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast">Saved</div>

      <!-- Bottom nav -->
      <nav class="nav" aria-label="Primary">
        <button class="active" data-nav="home" aria-label="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 11l8-7 8 7v9a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1v-9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </button>
        <button data-nav="stats" aria-label="Stats">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M5 19V11M12 19V5M19 19v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button data-nav="add" aria-label="Add">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button data-nav="history" aria-label="History">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button data-nav="profile" aria-label="Profile">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="9" r="3.2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M5 20c1.5-3.5 4-5 7-5s5.5 1.5 7 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </nav>

      <div class="home-ind" aria-hidden="true"></div>
    </div>
  </div>

<script>
(function(){
  const KEY = 'expense.app.v3';
  const $  = (s, r=document) => r.querySelector(s);
  const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));

  const startOfToday = () => { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); };
  const money = n => '$' + Number(n).toFixed(2);
  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const capitalize = s => s.charAt(0).toUpperCase() + s.slice(1);
  const uid = () => Math.random().toString(36).slice(2, 10);

  const tsFromTime = timeStr => {
    if (!timeStr) return Date.now();
    const [h, m] = String(timeStr).split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return Date.now();
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d.getTime();
  };

  const fmtDate = ts => {
    const d = new Date(ts);
    const today = new Date(); today.setHours(0,0,0,0);
    const yest  = new Date(today); yest.setDate(yest.getDate() - 1);
    const dStart = new Date(d); dStart.setHours(0,0,0,0);
    const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    if (dStart.getTime() === today.getTime()) return 'Today · ' + time;
    if (dStart.getTime() === yest.getTime())  return 'Yesterday · ' + time;
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' · ' + time;
  };

  const CAT_ICONS = {
    food: '<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M5 4v5a3 3 0 006 0V4M8 4v16M12 12c0 2 1 3 3 3V4c-2 0-3 1-3 3v5z" stroke="#000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    transport: '<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M3 12l2-5h10l2 5M5 12h10v3H5z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/><circle cx="7" cy="15.5" r="1.2" stroke="#000" stroke-width="1.2"/><circle cx="13" cy="15.5" r="1.2" stroke="#000" stroke-width="1.2"/></svg>',
    shopping: '<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 7h12l-1 9H5L4 7z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/><path d="M7 7a3 3 0 016 0" stroke="#000" stroke-width="1.6"/></svg>',
    bills: '<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 4h12v13l-2-1.2-2 1.2-2-1.2-2 1.2-2-1.2L4 17V4z" stroke="#000" stroke-width="1.6" stroke-linejoin="round"/></svg>'
  };
  const CAT_LABEL = { food:'Food', transport:'Transport', shopping:'Shopping', bills:'Bills' };

  // ---------- State ----------
  const defaults = { budget: 200, expenses: [], cat: 'food' };
  let state;
  try { state = Object.assign({}, defaults, JSON.parse(localStorage.getItem(KEY)) || {}); }
  catch { state = Object.assign({}, defaults); }

  const save = () => localStorage.setItem(KEY, JSON.stringify(state));

  // ---------- Render ----------
  const todays = () => state.expenses.filter(e => e.ts >= startOfToday());

  const render = () => {
    const t = todays();
    const total = t.reduce((s,e) => s + e.amount, 0);
    const left  = Math.max(0, state.budget - total);
    const pct   = state.budget > 0 ? Math.min(100, Math.round((total / state.budget) * 100)) : 0;

    $('#today-amount').textContent = money(total);
    $('#budget-left').textContent  = money(left);
    $('#ring').style.setProperty('--p', pct);
    $('#ring-pct').textContent     = pct + '%';
    $('#budget-value').textContent = money(state.budget);
    $('#history-count').textContent =
      state.expenses.length === 1 ? '1 item' : state.expenses.length + ' items';

    $$('.chip').forEach(c => c.classList.toggle('active', c.dataset.cat === state.cat));
    $$('.cat-ic').forEach(c => c.classList.toggle('on', c.dataset.cat === state.cat));

    const calc = $('#calc-btn');
    const amt = parseAmount($('#amount').value);
    calc.disabled = !(amt > 0);
  };

  const parseAmount = v => {
    if (!v) return NaN;
    const n = parseFloat(String(v).replace(/[^0-9.]/g, ''));
    return isNaN(n) ? NaN : n;
  };

  // ---------- Toast ----------
  let toastTimer;
  const toast = msg => {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  };

  // ---------- Add expense ----------
  const addExpense = () => {
    const amt = parseAmount($('#amount').value);
    if (!(amt > 0)) {
      $('#amount').focus();
      toast('Enter an amount');
      return;
    }
    const name = $('#name').value.trim() || CAT_LABEL[state.cat];
    state.expenses.push({ id: uid(), amount: amt, name, category: state.cat, ts: tsFromTime($('#time').value) });
    save();
    $('#amount').value = '';
    $('#name').value = '';
    $('#time').value = '';
    const a = $('#today-amount');
    a.classList.add('bump');
    setTimeout(() => a.classList.remove('bump'), 250);
    render();
    toast('Added ' + money(amt));
  };

  // ---------- Sheet ----------
  const wrap = $('#sheet-wrap');
  const openSheet = (title, html) => {
    $('#sheet-title').textContent = title;
    $('#sheet-body').innerHTML = html;
    wrap.classList.add('open');
    wrap.setAttribute('aria-hidden','false');
  };
  const closeSheet = () => {
    wrap.classList.remove('open');
    wrap.setAttribute('aria-hidden','true');
  };

  // ---------- Sheet: Add Expense ----------
  const openAdd = (presetCat) => {
    if (presetCat && CAT_LABEL[presetCat]) { state.cat = presetCat; save(); render(); }
    const chips = ['food','transport','shopping','bills'].map(c => `
      <button class="chip ${c === state.cat ? 'active' : ''}" data-cat="${c}" type="button">
        ${CAT_ICONS[c]}${CAT_LABEL[c]}
      </button>
    `).join('');

    openSheet('Add Expense', `
      <p style="margin:0 0 12px;color:#6b6b6b;font-size:12.5px;font-weight:600;">
        Log a new expense in seconds.
      </p>
      <div class="big-field">
        <span class="dollar">$</span>
        <input id="add-amount" type="text" inputmode="decimal" placeholder="0.00" />
      </div>
      <div class="field" style="margin-bottom:10px;">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 5h12M4 10h12M4 15h8"/>
        </svg>
        <input id="add-name" type="text" placeholder="Expense name" autocomplete="off" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="7"/>
          <path d="M10 6v4l3 2"/>
        </svg>
        <input id="add-time" type="time" autocomplete="off" aria-label="Time (optional)" />
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;" id="add-chips">${chips}</div>
      <button class="save-btn" id="add-save">Save expense</button>
    `);

    const amtIn = $('#add-amount');
    setTimeout(() => amtIn.focus(), 320);

    $$('#add-chips .chip').forEach(c => {
      c.addEventListener('click', () => {
        state.cat = c.dataset.cat; save();
        $$('#add-chips .chip').forEach(x => x.classList.toggle('active', x.dataset.cat === state.cat));
        render();
      });
    });

    const commit = () => {
      const v = parseAmount(amtIn.value);
      if (!(v > 0)) { toast('Enter an amount'); amtIn.focus(); return; }
      const name = ($('#add-name').value || '').trim() || CAT_LABEL[state.cat];
      state.expenses.push({ id: uid(), amount: v, name, category: state.cat, ts: tsFromTime($('#add-time').value) });
      save();
      const a = $('#today-amount'); a.classList.add('bump');
      setTimeout(() => a.classList.remove('bump'), 250);
      render();
      closeSheet();
      toast('Added ' + money(v));
    };
    $('#add-save').addEventListener('click', commit);
    amtIn.addEventListener('keydown', e => { if (e.key === 'Enter') commit(); });
    $('#add-name').addEventListener('keydown', e => { if (e.key === 'Enter') commit(); });
    $('#add-time').addEventListener('keydown', e => { if (e.key === 'Enter') commit(); });
  };

  // ---------- Sheet: Budget ----------
  const openBudget = () => {
    openSheet('Daily Budget', `
      <p style="margin:0 0 12px;color:#6b6b6b;font-size:12.5px;font-weight:600;">
        How much can you spend each day?
      </p>
      <div class="big-field">
        <span class="dollar">$</span>
        <input id="budget-input" type="text" inputmode="decimal" value="${Number.isInteger(state.budget) ? state.budget : state.budget.toFixed(2)}" />
      </div>
      <div class="preset-row">
        <button class="preset" data-preset="50">$50</button>
        <button class="preset" data-preset="100">$100</button>
        <button class="preset" data-preset="200">$200</button>
        <button class="preset" data-preset="500">$500</button>
      </div>
      <button class="save-btn" id="budget-save">Save budget</button>
    `);
    const input = $('#budget-input');
    setTimeout(() => { input.focus(); input.select(); }, 320);

    $$('.preset', $('#sheet-body')).forEach(b => {
      b.addEventListener('click', () => { input.value = b.dataset.preset; input.focus(); });
    });
    $('#budget-save').addEventListener('click', () => {
      const v = parseAmount(input.value);
      if (!(v > 0)) { toast('Enter a valid amount'); return; }
      state.budget = v; save(); render(); closeSheet(); toast('Budget set to ' + money(v));
    });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') $('#budget-save').click(); });
  };

  // ---------- Sheet: History ----------
  const renderHistory = () => {
    const body = $('#sheet-body');
    const total = state.expenses.reduce((s,e) => s + e.amount, 0);
    const list = state.expenses.length === 0
      ? '<div class="empty">No expenses yet.<br/>Add one to get started.</div>'
      : state.expenses.slice().reverse().map(e => `
          <div class="hist-row">
            <div class="hist-ic" aria-hidden="true">${CAT_ICONS[e.category] || ''}</div>
            <div class="hist-meta">
              <div class="hist-name">${escapeHtml(e.name)}</div>
              <div class="hist-sub">${capitalize(e.category)} · ${fmtDate(e.ts)}</div>
            </div>
            <div class="hist-amt">${money(e.amount)}</div>
            <button class="hist-del" data-id="${e.id}" aria-label="Delete">×</button>
          </div>
        `).join('');

    body.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
        <div style="font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b6b6b;">Total tracked</div>
        <div style="font-size:18px;font-weight:900;letter-spacing:-.02em;font-variant-numeric:tabular-nums;">${money(total)}</div>
      </div>
      <button class="pill-cta" id="hist-add" type="button" style="margin-bottom:12px;">
        <span class="plus">+</span> Add expense
      </button>
      <div id="hist-list" style="overflow-y:auto;max-height:40vh;">${list}</div>
      <div class="sheet-foot">
        ${state.expenses.length ? '<button class="ghost-btn" id="clear-all">Clear all</button>' : '<span></span>'}
        <button class="save-btn" style="width:auto;padding:9px 16px;" id="hist-close">Done</button>
      </div>
    `;
    $('#hist-add').addEventListener('click', () => openAdd());

    $$('.hist-del', body).forEach(b => {
      b.addEventListener('click', () => {
        const id = b.dataset.id;
        state.expenses = state.expenses.filter(e => e.id !== id);
        save(); render(); renderHistory(); toast('Removed');
      });
    });
    const clear = $('#clear-all'); if (clear) clear.addEventListener('click', () => {
      if (state.expenses.length === 0) return;
      state.expenses = []; save(); render(); renderHistory(); toast('History cleared');
    });
    const hc = $('#hist-close'); if (hc) hc.addEventListener('click', closeSheet);
  };
  const openHistory = () => { openSheet('Expense History', ''); renderHistory(); };

  // ---------- Sheet: Stats ----------
  const openStats = () => {
    const t = todays();
    const cats = ['food','transport','shopping','bills'];
    const sums = Object.fromEntries(cats.map(c => [c, 0]));
    t.forEach(e => { sums[e.category] = (sums[e.category] || 0) + e.amount; });
    const max = Math.max(1, ...Object.values(sums));
    const total = t.reduce((s,e) => s + e.amount, 0);

    const rows = cats.map(c => `
      <div class="stat-row">
        <div class="stat-name">${CAT_LABEL[c]}</div>
        <div class="stat-bar"><i style="width:${(sums[c]/max)*100}%"></i></div>
        <div class="stat-amt">${money(sums[c])}</div>
      </div>
    `).join('');

    openSheet("Today's Stats", `
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
        <div style="font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b6b6b;">Spent today</div>
        <div style="font-size:22px;font-weight:900;letter-spacing:-.02em;font-variant-numeric:tabular-nums;">${money(total)}</div>
      </div>
      ${rows}
      ${t.length === 0 ? '<div class="empty">No expenses logged today yet.</div>' : ''}
      <button class="pill-cta" id="stats-add" type="button" style="margin-top:14px;">
        <span class="plus">+</span> Add expense
      </button>
    `);
    $('#stats-add').addEventListener('click', () => openAdd());
  };

  // ---------- Sheet: Profile ----------
  const openProfile = () => {
    const total = state.expenses.reduce((s,e) => s + e.amount, 0);
    const days = new Set(state.expenses.map(e => new Date(e.ts).toDateString())).size;
    openSheet('Your Profile', `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="width:54px;height:54px;border-radius:50%;background:#f2f2f2;border:1px solid #ececec;display:grid;place-items:center;">
          <svg width="26" height="26" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="7.5" r="3" stroke="#000" stroke-width="1.6"/>
            <path d="M3.5 17c1.2-3 3.6-4.5 6.5-4.5s5.3 1.5 6.5 4.5" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div style="font-size:16px;font-weight:900;letter-spacing:-.02em;">You</div>
          <div style="font-size:12px;color:#6b6b6b;font-weight:600;">${days} day${days===1?'':'s'} tracked · ${money(total)} total</div>
        </div>
      </div>

      <div style="font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b6b6b;margin:6px 0 8px;">Quick add</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;" id="quick-grid">
        ${['food','transport','shopping','bills'].map(c => `
          <button class="quick-tile" data-quick="${c}" type="button">
            <div class="ic">${CAT_ICONS[c]}</div>
            <div class="quick-title">${CAT_LABEL[c]}</div>
            <div class="quick-sub">Tap to add</div>
          </button>
        `).join('')}
      </div>

      <button class="save-btn" id="profile-add" type="button">+ Add expense</button>
    `);

    $$('#quick-grid [data-quick]').forEach(b => {
      b.addEventListener('click', () => openAdd(b.dataset.quick));
    });
    $('#profile-add').addEventListener('click', () => openAdd());
  };

  // ---------- Events ----------
  $('#chip-row').addEventListener('click', e => {
    const c = e.target.closest('.chip'); if (!c) return;
    state.cat = c.dataset.cat; save(); render();
  });
  $('#cats').addEventListener('click', e => {
    const c = e.target.closest('.cat-ic'); if (!c) return;
    state.cat = c.dataset.cat; save(); render();
  });
  $('#cats').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      const c = e.target.closest('.cat-ic'); if (!c) return;
      e.preventDefault();
      state.cat = c.dataset.cat; save(); render();
    }
  });

  $('#amount').addEventListener('input', render);
  $('#name').addEventListener('keydown', e => { if (e.key === 'Enter') addExpense(); });
  $('#amount').addEventListener('keydown', e => { if (e.key === 'Enter') addExpense(); });
  $('#time').addEventListener('keydown', e => { if (e.key === 'Enter') addExpense(); });
  $('#calc-btn').addEventListener('click', addExpense);

  $('#add-cta').addEventListener('click', () => openAdd());

  $$('.mini').forEach(m => {
    const fire = () => {
      if (m.dataset.action === 'budget')  openBudget();
      if (m.dataset.action === 'history') openHistory();
    };
    m.addEventListener('click', fire);
    m.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(); } });
  });

  $('#sheet-close').addEventListener('click', closeSheet);
  $('#backdrop').addEventListener('click', closeSheet);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

  $$('.nav button').forEach(b => {
    b.addEventListener('click', () => {
      $$('.nav button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const v = b.dataset.nav;
      if (v === 'add')     openAdd();
      if (v === 'stats')   openStats();
      if (v === 'history') openHistory();
      if (v === 'profile') openProfile();
      if (v === 'home')    { closeSheet(); $('#scroll').scrollTo({ top: 0, behavior: 'smooth' }); }
    });
  });

  $('#avatar').addEventListener('click', openProfile);

  render();
})();
</script>
</body>
</html>
